{% extends "base.html" %}
{% block content %}
<h2>Bienvenida</h2>
<p>Este sistema te ayuda a organizar recordatorios, comidas, pendientes y ver los datos guardados.</p>

<div style="margin-top: 30px; display:flex; justify-content:center; gap:20px; flex-wrap:wrap;">
    <a href="{{ url_for('recordatorios') }}" 
       style="flex:1; min-width:150px; text-align:center; padding:15px 20px; background-color:#4CAF50; color:white; text-decoration:none; border-radius:8px;">
       📌 Recordatorios
    </a>

    <a href="{{ url_for('comidas') }}" 
       style="flex:1; min-width:150px; text-align:center; padding:15px 20px; background-color:#2196F3; color:white; text-decoration:none; border-radius:8px;">
       🍽️ Comidas
    </a>

    <a href="{{ url_for('pendientes') }}" 
       style="flex:1; min-width:150px; text-align:center; padding:15px 20px; background-color:#FF9800; color:white; text-decoration:none; border-radius:8px;">
       ✅ Pendientes
    </a>

    <a href="{{ url_for('datos') }}" 
       style="flex:1; min-width:150px; text-align:center; padding:15px 20px; background-color:#9C27B0; color:white; text-decoration:none; border-radius:8px;">
       📂 Datos JSON
    </a>
</div>
{% endblock %}
